name: CI
on:
  pull_request:
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  bake:
    name: Bake ${{ matrix.project_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project_name: My API Server 2
            extra-args: project_name="My API Server 2"
            slug: my-api-server-2
          - project_name: My_Underscore App
            extra-args: project_name="My_Underscore App"
            slug: my-underscore-app
          - project_name: My Project
            extra-args: ""
            slug: my-project
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Bake project
        run: uvx cookiecutter . --no-input -o /tmp/bake ${{ matrix.extra-args }}
      - name: Assert lockfile exists
        working-directory: /tmp/bake/${{ matrix.slug }}
        run: test -f uv.lock
      - name: Install dependencies
        working-directory: /tmp/bake/${{ matrix.slug }}
        run: uv sync --locked
      - name: Run tests
        working-directory: /tmp/bake/${{ matrix.slug }}
        run: uv run pytest
      - name: Run pre-commit
        working-directory: /tmp/bake/${{ matrix.slug }}
        run: |
          git add -A
          uv run pre-commit run --all-files
  bake-invalid:
    name: Reject ${{ matrix.case }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - case: bad-description
            extra-args: description='has "quotes"'
          - case: bad-email
            extra-args: author_email=nope
          - case: bad-slug
            extra-args: project_name='My  Project'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Bake must fail
        run: |
          if uvx cookiecutter . --no-input -o /tmp/bake ${{ matrix.extra-args }}; then
            echo "expected bake to fail" && exit 1
          fi
          if find /tmp/bake -mindepth 1 -maxdepth 1 -type d | grep .; then
            echo "expected no generated project directories" && exit 1
          fi
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Run pre-commit
        run: uvx pre-commit run --all-files
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Bake project
        run: uvx cookiecutter . --no-input -o /tmp/bake
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0
      - name: Build image
        uses: docker/build-push-action@v7.2.0
        with:
          context: /tmp/bake/my-project
          file: /tmp/bake/my-project/.docker/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: UV_DEPENDENCY_GROUP=prod
