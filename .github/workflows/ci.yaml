name: CI
on:
  pull_request:
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  bake:
    name: Bake ${{ matrix.project_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project_name: My API Server 2
            extra-args: project_name="My API Server 2"
            slug: my-api-server-2
          - project_name: My_Underscore App
            extra-args: project_name="My_Underscore App"
            slug: my-underscore-app
          - project_name: My Project
            extra-args: ""
            slug: my-project
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Bake project
        run: uvx cookiecutter . -o /tmp/bake --no-input ${{ matrix.extra-args }}
      - name: Assert lockfile exists
        working-directory: /tmp/bake/${{ matrix.slug }}
        run: test -f uv.lock
      - name: Install dependencies
        working-directory: /tmp/bake/${{ matrix.slug }}
        run: uv sync --locked
      - name: Run tests
        working-directory: /tmp/bake/${{ matrix.slug }}
        run: uv run pytest
      - name: Run pre-commit
        working-directory: /tmp/bake/${{ matrix.slug }}
        run: |
          git add -A
          uv run pre-commit run --all-files
  bake-invalid:
    name: Reject ${{ matrix.case }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - case: bad-description
            extra-args: description='has "quotes"'
          - case: bad-email
            extra-args: author_email=nope
          - case: bad-slug
            extra-args: project_name='My  Project'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Bake must fail
        run: |
          if uvx cookiecutter . -o /tmp/bake --no-input ${{ matrix.extra-args }}; then
            echo "expected bake to fail" && exit 1
          fi
          if find /tmp/bake -mindepth 1 -maxdepth 1 -type d | grep .; then
            echo "expected no generated project directories" && exit 1
          fi
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Bake project
        run: uvx cookiecutter . -o /tmp/bake --no-input
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0
      - name: Build image
        uses: docker/build-push-action@v7.2.0
        with:
          context: /tmp/bake/my-project
          file: /tmp/bake/my-project/.docker/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: UV_DEPENDENCY_GROUP=prod
  docker-compose-smoke:
    name: Docker compose smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Show compose version
        run: docker compose version
      - name: Bake project
        run: uvx cookiecutter . -o /tmp/smoke --no-input
      - name: Prepare production env file
        working-directory: /tmp/smoke/my-project
        run: |
          cp .env.example .env
          sed -i "s|^SECRET_KEY=.*|SECRET_KEY=$(uuidgen)$(uuidgen)|" .env
          sed -i "s|^AWS_STORAGE_BUCKET_NAME=.*|AWS_STORAGE_BUCKET_NAME=$(uuidgen)|" .env
          sed -i "s|^SENTRY_DSN=.*|SENTRY_DSN=https://$(uuidgen | tr -d -)@sentry.example.com/1|" .env
          sed -i "s|^RESEND_API_KEY=.*|RESEND_API_KEY=$(uuidgen)|" .env
      - name: Adapt pre_start for GitHub runner Compose
        working-directory: /tmp/smoke/my-project
        run: |
          # Temporary CI-only compatibility patch: GitHub-hosted runners reject
          # the Compose pre_start lifecycle hook that the template ships with.
          # Remove this step once runner Compose accepts that modern hook.
          python - <<'PY'
          from pathlib import Path

          compose = Path(".docker/compose/prod.yaml")
          text = compose.read_text()
          pre_start = """    pre_start:
                - command:
                    - /app/.docker/scripts/migrations.sh
          """
          command = """    command:
                - /bin/sh
                - -c
                - /app/.docker/scripts/migrations.sh && exec /app/.docker/scripts/gunicorn.sh
          """
          if pre_start not in text:
              raise SystemExit("expected api pre_start hook not found")
          compose.write_text(text.replace(pre_start, command))
          PY
      - name: Boot production stack
        working-directory: /tmp/smoke/my-project
        run: docker compose -f .docker/compose/prod.yaml --env-file=.env up -d --build --wait --wait-timeout=300
      - name: Probe liveness and readiness from inside the api container
        working-directory: /tmp/smoke/my-project
        run: |
          docker compose -f .docker/compose/prod.yaml --env-file=.env exec api curl -fsS http://127.0.0.1:8000/api/health
          docker compose -f .docker/compose/prod.yaml --env-file=.env exec api curl -fsS http://127.0.0.1:8000/api/ready
      - name: Probe through traefik
        working-directory: /tmp/smoke/my-project
        run: |
          curl -fsS http://localhost/api/health
          curl -fsS http://localhost/api/ready
      - name: Assert service states
        working-directory: /tmp/smoke/my-project
        run: |
          docker compose -f .docker/compose/prod.yaml --env-file=.env ps
          docker compose -f .docker/compose/prod.yaml --env-file=.env ps --format='{{.State}}' celery-beat | grep -x running
          test -z "$(docker compose -f .docker/compose/prod.yaml --env-file=.env ps -q --status=exited)"
      - name: Dump logs on failure
        if: failure()
        working-directory: /tmp/smoke/my-project
        run: docker compose -f .docker/compose/prod.yaml --env-file=.env logs
      - name: Tear down
        if: always()
        working-directory: /tmp/smoke/my-project
        run: docker compose -f .docker/compose/prod.yaml --env-file=.env down -v
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Run pre-commit
        run: uvx pre-commit run --all-files
