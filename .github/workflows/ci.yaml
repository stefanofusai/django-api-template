name: CI
on:
  pull_request:
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  bake:
    name: Bake ${{ matrix.case }}
    runs-on: ubuntu-latest
    services:
      postgres:
        # Keep this image in sync with .docker/compose/{dev,prod}.yaml;
        # Dependabot does not track images inside workflow service blocks;
        # scripts/check_postgres_image.py enforces agreement.
        image: postgres:18.4
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: mock-postgres-password
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready --username=$POSTGRES_USER" --health-interval=5s --health-retries=5 --health-timeout=5s
    strategy:
      fail-fast: false
      matrix:
        include:
          - case: cors
            project_name: My Project
            extra-args: use_cors=yes
            slug: my-project
          - case: cors-csp
            project_name: My Project
            extra-args: use_cors=yes use_csp=yes
            slug: my-project
          - case: cors-throttling
            project_name: My Project
            extra-args: use_cors=yes api_throttling=basic
            slug: my-project
          - case: csp
            project_name: My Project
            extra-args: use_csp=yes
            slug: my-project
          - case: default
            project_name: My Project
            extra-args: ""
            slug: my-project
          - case: example-api
            project_name: My Project
            extra-args: use_example_api=yes
            slug: my-project
          - case: example-jwt-auth
            project_name: My Project
            extra-args: use_example_api=yes api_auth=jwt
            slug: my-project
          - case: example-jwt-auth-throttling
            project_name: My Project
            extra-args: use_example_api=yes api_auth=jwt api_throttling=basic
            slug: my-project
          - case: example-minimal
            project_name: My Project
            extra-args: use_example_api=yes use_celery=none email_provider=none use_sentry=no use_s3_media=no use_traefik=no
            slug: my-project
          - case: external-backing
            project_name: My Project
            extra-args: postgres=external redis=external use_traefik=no
            slug: my-project
          - case: external-postgres
            project_name: My Project
            extra-args: postgres=external
            slug: my-project
          - case: external-tls
            project_name: My Project
            extra-args: traefik_tls=external
            slug: my-project
          - case: hyphenated
            project_name: My API Server 2
            extra-args: project_name="My API Server 2"
            slug: my-api-server-2
          - case: minimal
            project_name: My Project
            extra-args: use_celery=none email_provider=none use_sentry=no use_s3_media=no use_traefik=no
            slug: my-project
          - case: no-proxy
            project_name: My Project
            extra-args: use_traefik=no behind_proxy=no
            slug: my-project
          - case: smtp
            project_name: My Project
            extra-args: email_provider=smtp
            slug: my-project
          - case: throttling-no-example
            project_name: My Project
            extra-args: api_throttling=basic
            slug: my-project
          - case: underscored
            project_name: My_Underscore App
            extra-args: project_name="My_Underscore App"
            slug: my-underscore-app
          - case: worker-no-email
            project_name: My Project
            extra-args: use_celery=worker email_provider=none
            slug: my-project
          - case: worker-only
            project_name: My Project
            extra-args: use_celery=worker
            slug: my-project
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Cache pre-commit environments
        uses: actions/cache@v6.1.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('{{cookiecutter.project_slug}}/.pre-commit-config.yaml') }}
      - name: Bake project
        run: uvx cookiecutter . -o /tmp/bake --no-input ${{ matrix.extra-args }}
      - name: Assert lockfile exists
        working-directory: /tmp/bake/${{ matrix.slug }}
        run: test -f uv.lock
      - name: Install dependencies
        working-directory: /tmp/bake/${{ matrix.slug }}
        run: uv sync --locked
      - name: Run tests
        working-directory: /tmp/bake/${{ matrix.slug }}
        env:
          DATABASE_URL: postgres://postgres:mock-postgres-password@localhost:5432/postgres
        run: uv run pytest
      - name: Check migrations
        working-directory: /tmp/bake/${{ matrix.slug }}
        run: ./.github/scripts/migrations-check.sh
      - name: Run pre-commit
        working-directory: /tmp/bake/${{ matrix.slug }}
        run: |
          git add -A
          uv run pre-commit run --all-files
  reject-invalid-input:
    name: Reject invalid input (${{ matrix.case }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - case: bad-author-name
            extra-args: author_name='has "quotes"'
          - case: bad-description
            extra-args: description='has "quotes"'
          - case: bad-domain
            extra-args: domain_name=no-dot
          - case: bad-email
            extra-args: author_email=nope
          - case: bad-email-quote
            extra-args: author_email='has"quote@example.com'
          - case: bad-knob
            extra-args: use_celery=bogus
          - case: bad-slug
            extra-args: project_name='My  Project'
          - case: bad-slug-length
            extra-args: project_slug=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          - case: bad-username
            extra-args: github_username=-bad-
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Verify invalid input is rejected
        run: |
          if uvx cookiecutter . -o /tmp/bake --no-input ${{ matrix.extra-args }}; then
            echo "expected bake to fail" && exit 1
          fi
          if find /tmp/bake -mindepth 1 -maxdepth 1 -type d | grep .; then
            echo "expected no generated project directories" && exit 1
          fi
  build-docker-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Bake project
        run: uvx cookiecutter . -o /tmp/bake --no-input
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0
      - name: Build production image
        uses: docker/build-push-action@v7.2.0
        with:
          context: /tmp/bake/my-project
          file: /tmp/bake/my-project/.docker/Dockerfile
          push: false
          cache-from: type=gha,scope=prod
          cache-to: type=gha,mode=max,scope=prod
          build-args: UV_DEPENDENCY_GROUP=prod
      - name: Build development image
        uses: docker/build-push-action@v7.2.0
        with:
          context: /tmp/bake/my-project
          file: /tmp/bake/my-project/.docker/Dockerfile
          push: false
          cache-from: type=gha,scope=dev
          cache-to: type=gha,mode=max,scope=dev
          build-args: UV_DEPENDENCY_GROUP=dev
  smoke-test-docker-compose:
    name: Smoke test Docker Compose (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            extra-args: ""
          - variant: external-backing
            extra-args: postgres=external redis=external use_traefik=no
          - variant: minimal
            extra-args: use_celery=none email_provider=none use_sentry=no use_s3_media=no use_traefik=no
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Install Docker Compose with pre_start support
        run: |
          mkdir -p ~/.docker/cli-plugins
          curl -fsSL \
            https://github.com/docker/compose/releases/download/v5.3.0/docker-compose-linux-x86_64 \
            -o ~/.docker/cli-plugins/docker-compose
          echo "fffb010206c952ee5e45d0cd05dc88d3ca063c4634d40eaad6b72677c4c7bbf0  $HOME/.docker/cli-plugins/docker-compose" | sha256sum -c -
          chmod +x ~/.docker/cli-plugins/docker-compose
          docker compose version
      - name: Show Docker Compose version
        run: docker compose version
      - name: Bake project
        run: uvx cookiecutter . -o /tmp/smoke --no-input ${{ matrix.extra-args }}
      - name: Prepare default production env file
        if: matrix.variant == 'default'
        working-directory: /tmp/smoke/my-project
        run: |
          cp .env.example .env
          postgres_password="mock-postgres-password"
          redis_password="mock-redis-password"
          sed -i "s|^ALLOWED_HOSTS=.*|ALLOWED_HOSTS=localhost,127.0.0.1,api.example.test|" .env
          sed -i "s|^AWS_STORAGE_BUCKET_NAME=.*|AWS_STORAGE_BUCKET_NAME=mock-storage-bucket|" .env
          sed -i "s|^CACHE_URL=.*|CACHE_URL=rediscache://:$redis_password@redis:6379/0|" .env
          sed -i "s|^CELERY_BROKER_URL=.*|CELERY_BROKER_URL=redis://:$redis_password@redis:6379/1|" .env
          sed -i "s|^DATABASE_URL=.*|DATABASE_URL=postgres://my_project:$postgres_password@postgres:5432/my_project|" .env
          sed -i "s|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=$postgres_password|" .env
          sed -i "s|^REDIS_PASSWORD=.*|REDIS_PASSWORD=$redis_password|" .env
          sed -i "s|^RESEND_API_KEY=.*|RESEND_API_KEY=mock-resend-api-key|" .env
          sed -i "s|^SECRET_KEY=.*|SECRET_KEY=mock-secret-key-0123456789-abcdefghijklmnopqrstuvwxyz|" .env
          sed -i "s|^SENTRY_DSN=.*|SENTRY_DSN=https://mock-sentry-key@sentry.example.test/1|" .env
      - name: Prepare external-backing production env file
        if: matrix.variant == 'external-backing'
        working-directory: /tmp/smoke/my-project
        run: |
          cp .env.example .env
          postgres_password="mock-postgres-password"
          redis_password="mock-redis-password"
          sed -i "s|^ALLOWED_HOSTS=.*|ALLOWED_HOSTS=localhost,127.0.0.1,api.example.test|" .env
          sed -i "s|^AWS_STORAGE_BUCKET_NAME=.*|AWS_STORAGE_BUCKET_NAME=mock-storage-bucket|" .env
          sed -i "s|^CACHE_URL=.*|CACHE_URL=rediscache://:$redis_password@redis:6379/0|" .env
          sed -i "s|^CELERY_BROKER_URL=.*|CELERY_BROKER_URL=redis://:$redis_password@redis:6379/1|" .env
          sed -i "s|^DATABASE_URL=.*|DATABASE_URL=postgres://ci:$postgres_password@postgres:5432/ci|" .env
          sed -i "s|^POSTGRES_DB=.*|POSTGRES_DB=ci|" .env
          sed -i "s|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=$postgres_password|" .env
          sed -i "s|^POSTGRES_USER=.*|POSTGRES_USER=ci|" .env
          sed -i "s|^RESEND_API_KEY=.*|RESEND_API_KEY=mock-resend-api-key|" .env
          sed -i "s|^SECRET_KEY=.*|SECRET_KEY=mock-secret-key-0123456789-abcdefghijklmnopqrstuvwxyz|" .env
          sed -i "s|^SENTRY_DSN=.*|SENTRY_DSN=https://mock-sentry-key@sentry.example.test/1|" .env
          printf '%s\n' "REDIS_PASSWORD=$redis_password" >> .env
      - name: Prepare minimal production env file
        if: matrix.variant == 'minimal'
        working-directory: /tmp/smoke/my-project
        run: |
          cp .env.example .env
          postgres_password="mock-postgres-password"
          redis_password="mock-redis-password"
          sed -i "s|^ALLOWED_HOSTS=.*|ALLOWED_HOSTS=localhost,127.0.0.1,api.example.test|" .env
          sed -i "s|^CACHE_URL=.*|CACHE_URL=rediscache://:$redis_password@redis:6379/0|" .env
          sed -i "s|^DATABASE_URL=.*|DATABASE_URL=postgres://my_project:$postgres_password@postgres:5432/my_project|" .env
          sed -i "s|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=$postgres_password|" .env
          sed -i "s|^REDIS_PASSWORD=.*|REDIS_PASSWORD=$redis_password|" .env
          sed -i "s|^SECRET_KEY=.*|SECRET_KEY=mock-secret-key-0123456789-abcdefghijklmnopqrstuvwxyz|" .env
      - name: Boot production stack
        working-directory: /tmp/smoke/my-project
        run: docker compose -f .docker/compose/prod.yaml -f .docker/compose/ci-services.yaml --env-file=.env up -d --build --wait --wait-timeout=300
      - name: Probe API container health
        working-directory: /tmp/smoke/my-project
        run: |
          docker compose -f .docker/compose/prod.yaml -f .docker/compose/ci-services.yaml --env-file=.env exec api curl -fsS http://127.0.0.1:8000/api/health
          docker compose -f .docker/compose/prod.yaml -f .docker/compose/ci-services.yaml --env-file=.env exec api curl -fsS http://127.0.0.1:8000/api/ready
      - name: Probe through Traefik
        if: matrix.variant == 'default'
        working-directory: /tmp/smoke/my-project
        run: |
          curl -fsS http://localhost/api/health
          curl -fsS http://localhost/api/ready
      - name: Probe host port
        if: contains(fromJSON('["external-backing", "minimal"]'), matrix.variant)
        working-directory: /tmp/smoke/my-project
        run: |
          curl -fsS http://127.0.0.1:8000/api/health
          curl -fsS http://127.0.0.1:8000/api/ready
      - name: Check default service states
        if: matrix.variant == 'default'
        working-directory: /tmp/smoke/my-project
        run: |
          docker compose -f .docker/compose/prod.yaml -f .docker/compose/ci-services.yaml --env-file=.env ps
          docker compose -f .docker/compose/prod.yaml -f .docker/compose/ci-services.yaml --env-file=.env ps --format='{{.State}}' celery-beat | grep -x running
          test -z "$(docker compose -f .docker/compose/prod.yaml -f .docker/compose/ci-services.yaml --env-file=.env ps -q --status=exited)"
      - name: Check host-port service states
        if: contains(fromJSON('["external-backing", "minimal"]'), matrix.variant)
        working-directory: /tmp/smoke/my-project
        run: |
          docker compose -f .docker/compose/prod.yaml -f .docker/compose/ci-services.yaml --env-file=.env ps
          test -z "$(docker compose -f .docker/compose/prod.yaml -f .docker/compose/ci-services.yaml --env-file=.env ps -q --status=exited)"
      - name: Dump Docker logs on failure
        if: failure()
        working-directory: /tmp/smoke/my-project
        run: docker compose -f .docker/compose/prod.yaml -f .docker/compose/ci-services.yaml --env-file=.env logs
      - name: Tear down Docker Compose
        if: always()
        working-directory: /tmp/smoke/my-project
        run: docker compose -f .docker/compose/prod.yaml -f .docker/compose/ci-services.yaml --env-file=.env down -v
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Cache pre-commit environments
        uses: actions/cache@v6.1.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-root-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Run pre-commit
        run: uvx pre-commit run --all-files
