default_install_hook_types:
  - commit-msg
  - pre-commit
exclude: ^(\{\{cookiecutter\.project_slug\}\}/|hooks/|plans/)
repos:
  # Git
  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint
        args:
          - --contrib=contrib-title-conventional-commits
          - --ignore=B6
          - --msg-filename
  # Generic checks and fixes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
        types_or:
          - python
          - pyi
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
  # Python
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-check
        args:
          - --fix
        types_or:
          - python
          - pyi
      - id: ruff-format
        types_or:
          - python
          - pyi
  - repo: https://github.com/astral-sh/ty-pre-commit
    rev: v0.0.47
    hooks:
      - id: ty
        args:
          - --locked
          - --no-python-downloads
        always_run: true
        pass_filenames: false
  # Markdown
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args:
          - --disable=MD013
          - --
  # Shell
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
  # YAML
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args:
          - -d
          - |
            extends: default
            rules:
              comments:
                min-spaces-from-content: 1
              document-start:
                present: false
              line-length: disable
  # GitHub Actions / JSON schema
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.2
    hooks:
      - id: check-dependabot
      - id: check-github-workflows
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.26.1
    hooks:
      - id: zizmor
        files: ^\.github/workflows/
  # Repo invariants
  - repo: local
    hooks:
      - id: dockerfile-prod-env
        name: dockerfile production collectstatic env matches prod settings
        entry: python scripts/check_dockerfile_prod_env.py
        language: system
        pass_filenames: false
        always_run: true
      - id: generated-format
        name: generated projects pass ruff format and check
        entry: python scripts/check_generated_format.py
        language: system
        pass_filenames: false
        always_run: true
      - id: postgres-image-pin
        name: postgres image pins agree across compose and workflows
        entry: python scripts/check_postgres_image.py
        language: system
        pass_filenames: false
        always_run: true
      - id: root-tests
        name: root guard-script unit tests
        entry: uv run --locked pytest tests
        language: system
        pass_filenames: false
        always_run: true
      - id: skills-lock
        name: vendored agent skills match skills-lock.json hashes
        entry: python scripts/check_skills_lock.py
        language: system
        pass_filenames: false
        always_run: true
      - id: toolchain-pins
        name: root and generated toolchain pins agree
        entry: python scripts/check_toolchain_pins.py
        language: system
        pass_filenames: false
        always_run: true
