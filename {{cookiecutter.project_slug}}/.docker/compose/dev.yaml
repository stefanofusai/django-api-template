services:
  api:
    build:
      context: ../..
      dockerfile: .docker/Dockerfile
      args:
        UV_DEPENDENCY_GROUP: dev
    command: /app/.docker/scripts/dev.sh
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      DJANGO_ENV: dev
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - -o
        - /dev/null
        - http://127.0.0.1:8000/api/health
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 2s
    ports:
      - "8000:8000"
    pre_start:
      - command:
          - /app/.docker/scripts/migrations.sh
    volumes:
      - ../../manage.py:/app/manage.py
      - ../../src:/app/src
      - media_data:/app/media
{%- if cookiecutter.use_celery == "worker+beat" %}
  celery-beat:
    build:
      context: ../..
      dockerfile: .docker/Dockerfile
      args:
        UV_DEPENDENCY_GROUP: dev
    command: /app/.docker/scripts/celery-beat.sh
    # Gates on api health as a "migrations completed" signal: api's
    # pre_start runs migrate before the api container starts serving.
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      DJANGO_ENV: dev
    volumes:
      - ../../manage.py:/app/manage.py
      - ../../src:/app/src
      - media_data:/app/media
{%- endif %}
{%- if cookiecutter.use_celery != "none" %}
  celery-worker:
    build:
      context: ../..
      dockerfile: .docker/Dockerfile
      args:
        UV_DEPENDENCY_GROUP: dev
    command: /app/.docker/scripts/celery-worker.sh
    # Gates on api health as a "migrations completed" signal: api's
    # pre_start runs migrate before the api container starts serving.
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      DJANGO_ENV: dev
    healthcheck:
      test:
        - CMD-SHELL
        - celery -A config inspect ping --destination=celery-worker@$$HOSTNAME --timeout=5
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
      start_interval: 5s
    volumes:
      - ../../manage.py:/app/manage.py
      - ../../src:/app/src
      - media_data:/app/media
{%- endif %}
  postgres:
    env_file:
      - ../../.env
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
      start_interval: 2s
    image: postgres:18.4
    volumes:
      - postgres_data:/var/lib/postgresql
  redis:
    command:
      - redis-server
      - --appendonly
      - "yes"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
      start_interval: 2s
    image: redis:8.8.0
    volumes:
      - redis_data:/data
volumes:
  media_data:
  postgres_data:
  redis_data:
