services:
  api:
    build:
      context: ../..
      dockerfile: .docker/Dockerfile
      args:
        UV_DEPENDENCY_GROUP: dev
    command: /app/.docker/scripts/dev.sh
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      DJANGO_ENV: dev
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - -o
        - /dev/null
        - http://127.0.0.1:8000/api/ready
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "8000:8000"
    pre_start:
      - command:
          - /app/.docker/scripts/migrations.sh
    volumes:
      - ../../manage.py:/app/manage.py
      - ../../src:/app/src
      - media_data:/app/media
  postgres:
    env_file:
      - ../../.env
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}"
      interval: 5s
      timeout: 5s
      retries: 5
    image: postgres:18.4
    volumes:
      - postgres_data:/var/lib/postgresql
  redis:
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 5s
      retries: 5
    image: redis:8.8.0
    volumes:
      - redis_data:/data
  worker:
    build:
      context: ../..
      dockerfile: .docker/Dockerfile
      args:
        UV_DEPENDENCY_GROUP: dev
    command: /app/.docker/scripts/worker.sh
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      DJANGO_ENV: dev
    healthcheck:
      test:
        - CMD-SHELL
        - celery -A config inspect ping --destination=worker@$$HOSTNAME --timeout=5
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ../../manage.py:/app/manage.py
      - ../../src:/app/src
      - media_data:/app/media
volumes:
  media_data:
  postgres_data:
  redis_data:
