# CI-only stand-ins for external backing services; merged over prod.yaml by
# the docker-checks smoke job. Never use in production.
{% if cookiecutter.postgres != "external" and cookiecutter.redis != "external" -%}
services: {}
{%- else -%}
services:
  api:
    depends_on:
{%- if cookiecutter.postgres == "external" %}
      postgres:
        condition: service_healthy
{%- endif %}
{%- if cookiecutter.redis == "external" %}
      redis:
        condition: service_healthy
{%- endif %}
{%- if cookiecutter.postgres == "external" %}
  postgres:
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
      start_interval: 2s
    image: postgres:18.4
{%- endif %}
{%- if cookiecutter.redis == "external" %}
  redis:
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
      start_interval: 2s
    image: redis:8.8.0
{%- endif %}
{%- endif %}
