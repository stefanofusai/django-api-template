services:
  api:
    build:
      context: ../..
      dockerfile: .docker/Dockerfile
      args:
        UV_DEPENDENCY_GROUP: prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      DJANGO_ENV: prod
      FORWARDED_ALLOW_IPS: "*"
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - -o
        - /dev/null
        - http://127.0.0.1:8000/api/health
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 2s
    labels:
      - docker-rollout.pre-stop-hook=sleep 3
      - traefik.enable=true
      - traefik.http.middlewares.api-retry.retry.attempts=3
      - traefik.http.middlewares.api-retry.retry.initialinterval=100ms
      - traefik.http.routers.api-web.entrypoints=web
      - traefik.http.routers.api-web.middlewares=api-retry
      - traefik.http.routers.api-web.rule=PathPrefix(`/`)
      - traefik.http.routers.api-websecure.entrypoints=websecure
      - traefik.http.routers.api-websecure.middlewares=api-retry
      - traefik.http.routers.api-websecure.rule=Host(`${TRAEFIK_DOMAIN}`)
      - traefik.http.routers.api-websecure.tls.certresolver=letsencrypt
      - traefik.http.services.api.loadbalancer.healthcheck.hostname=localhost
      - traefik.http.services.api.loadbalancer.healthcheck.interval=1s
      - traefik.http.services.api.loadbalancer.healthcheck.path=/api/health
      - traefik.http.services.api.loadbalancer.healthcheck.timeout=1s
      - traefik.http.services.api.loadbalancer.server.port=8000
    pre_start:
      - command:
          - /app/.docker/scripts/migrations.sh
    restart: unless-stopped
    stop_grace_period: 5s
    stop_signal: SIGCONT
  celery-beat:
    build:
      context: ../..
      dockerfile: .docker/Dockerfile
      args:
        UV_DEPENDENCY_GROUP: prod
    command: /app/.docker/scripts/celery-beat.sh
    # Gates on api health as a "migrations completed" signal: api's
    # pre_start runs migrate before the api container starts serving.
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      DJANGO_ENV: prod
    restart: unless-stopped
  celery-worker:
    build:
      context: ../..
      dockerfile: .docker/Dockerfile
      args:
        UV_DEPENDENCY_GROUP: prod
    command: /app/.docker/scripts/celery-worker.sh
    # Gates on api health as a "migrations completed" signal: api's
    # pre_start runs migrate before the api container starts serving.
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      DJANGO_ENV: prod
    healthcheck:
      test:
        - CMD-SHELL
        - celery -A config inspect ping --destination=celery-worker@$$HOSTNAME --timeout=5
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
      start_interval: 5s
    restart: unless-stopped
  postgres:
    env_file:
      - ../../.env
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
      start_interval: 2s
    image: postgres:18.4
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql
  redis:
    command:
      - redis-server
      - --appendonly
      - "yes"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
      start_interval: 2s
    image: redis:8.8.0
    restart: unless-stopped
    volumes:
      - redis_data:/data
  traefik:
    command:
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --ping=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
    healthcheck:
      test:
        - CMD
        - traefik
        - healthcheck
        - --ping
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
      start_interval: 2s
    image: traefik:v3.7.6
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_data:/letsencrypt
volumes:
  postgres_data:
  redis_data:
  traefik_data:
