# Bounds json-file logs per container (~50 MB) so a chatty service
# cannot fill the host disk. Sizes are fixed operational constants.
x-default-logging: &default-logging
  driver: json-file
  options:
    max-file: "5"
    max-size: 10m
services:
  api:
    build:
      context: ../..
      dockerfile: .docker/Dockerfile
      args:
        UV_DEPENDENCY_GROUP: prod
{%- if cookiecutter.postgres == "compose" or cookiecutter.redis == "compose" %}
    depends_on:
{%- if cookiecutter.postgres == "compose" %}
      postgres:
        condition: service_healthy
{%- endif %}
{%- if cookiecutter.redis == "compose" %}
      redis:
        condition: service_healthy
{%- endif %}
{%- endif %}
    env_file:
      - ../../.env
    environment:
      DJANGO_ENV: prod
{%- if cookiecutter.use_traefik == "yes" or cookiecutter.behind_proxy == "yes" %}
      FORWARDED_ALLOW_IPS: "*"
{%- endif %}
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - -o
        - /dev/null
        - http://127.0.0.1:8000/api/health
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 2s
    image: ghcr.io/{{ cookiecutter.github_username | lower }}/{{ cookiecutter.project_slug }}:${APP_VERSION:-unreleased}
{%- if cookiecutter.use_traefik == "yes" %}
    labels:
      - docker-rollout.pre-stop-hook=sleep 3
      - traefik.enable=true
      - traefik.http.middlewares.api-retry.retry.attempts=3
      - traefik.http.middlewares.api-retry.retry.initialinterval=100ms
      - traefik.http.middlewares.ready-allowlist.ipallowlist.sourcerange=127.0.0.0/8,::1/128
      - traefik.http.routers.api-ready-private.entrypoints=ready
      - traefik.http.routers.api-ready-private.rule=Path(`/api/ready`)
      - traefik.http.routers.api-ready-private.service=api
      - traefik.http.routers.api-ready-web.entrypoints=web
      - traefik.http.routers.api-ready-web.middlewares=ready-allowlist
      - traefik.http.routers.api-ready-web.priority=100
      - traefik.http.routers.api-ready-web.rule=Path(`/api/ready`)
      - traefik.http.routers.api-ready-websecure.entrypoints=websecure
      - traefik.http.routers.api-ready-websecure.middlewares=ready-allowlist
      - traefik.http.routers.api-ready-websecure.priority=100
      - traefik.http.routers.api-ready-websecure.rule=Path(`/api/ready`)
{%- if cookiecutter.traefik_tls == "letsencrypt" %}
      - traefik.http.routers.api-ready-websecure.tls.certresolver=letsencrypt
{%- else %}
      - traefik.http.routers.api-ready-websecure.tls=true
{%- endif %}
      - traefik.http.routers.api-web.entrypoints=web
      - traefik.http.routers.api-web.middlewares=api-retry
      - traefik.http.routers.api-web.rule=PathPrefix(`/`)
      - traefik.http.routers.api-websecure.entrypoints=websecure
      - traefik.http.routers.api-websecure.middlewares=api-retry
      - traefik.http.routers.api-websecure.rule=Host(`${TRAEFIK_DOMAIN}`)
{%- if cookiecutter.traefik_tls == "letsencrypt" %}
      - traefik.http.routers.api-websecure.tls.certresolver=letsencrypt
{%- else %}
      - traefik.http.routers.api-websecure.tls=true
{%- endif %}
      - traefik.http.services.api.loadbalancer.healthcheck.hostname=localhost
      - traefik.http.services.api.loadbalancer.healthcheck.interval=1s
      - traefik.http.services.api.loadbalancer.healthcheck.path=/api/ready
      - traefik.http.services.api.loadbalancer.healthcheck.timeout=1s
      - traefik.http.services.api.loadbalancer.server.port=8000
{%- else %}
    ports:
      - "127.0.0.1:8000:8000"
{%- endif %}
    logging: *default-logging
    pre_start:
      - command:
          - /app/.docker/scripts/migrations.sh
{%- if cookiecutter.use_s3_media == "no" %}
    volumes:
      - media_data:/app/media
{%- endif %}
    restart: unless-stopped
    # Must exceed GUNICORN_GRACEFUL_TIMEOUT (.env, default 30s) so Docker
    # never SIGKILLs a still-draining gunicorn. Traefik removes the
    # container from rotation before SIGTERM lands (pre-stop hook + 1s
    # health checks), so SIGTERM only has to finish in-flight requests.
    stop_grace_period: 35s
{%- if cookiecutter.use_celery == "worker+beat" %}
  celery-beat:
    build:
      context: ../..
      dockerfile: .docker/Dockerfile
      args:
        UV_DEPENDENCY_GROUP: prod
    command: /app/.docker/scripts/celery-beat.sh
    # Gates on api health as a "migrations completed" signal: api's
    # pre_start runs migrate before the api container starts serving.
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      DJANGO_ENV: prod
    image: ghcr.io/{{ cookiecutter.github_username | lower }}/{{ cookiecutter.project_slug }}:${APP_VERSION:-unreleased}
    logging: *default-logging
    restart: unless-stopped
{%- endif %}
{%- if cookiecutter.use_celery != "none" %}
  celery-worker:
    build:
      context: ../..
      dockerfile: .docker/Dockerfile
      args:
        UV_DEPENDENCY_GROUP: prod
    command: /app/.docker/scripts/celery-worker.sh
    # Gates on api health as a "migrations completed" signal: api's
    # pre_start runs migrate before the api container starts serving.
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      DJANGO_ENV: prod
    healthcheck:
      test:
        - CMD-SHELL
        - celery -A config inspect ping --destination=celery-worker@$$HOSTNAME --timeout=5
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
      start_interval: 5s
    image: ghcr.io/{{ cookiecutter.github_username | lower }}/{{ cookiecutter.project_slug }}:${APP_VERSION:-unreleased}
    logging: *default-logging
{%- if cookiecutter.use_s3_media == "no" %}
    volumes:
      - media_data:/app/media
{%- endif %}
    restart: unless-stopped
    # Must exceed CELERY_TASK_TIME_LIMIT (330s, settings/components/celery.py)
    # so a warm shutdown can finish the in-flight task instead of Docker
    # SIGKILLing it mid-run; acks_late would then redeliver and re-run it.
    # Warm shutdown exits as soon as running tasks finish, so this is a
    # worst-case cap, not a fixed wait.
    stop_grace_period: 335s
{%- endif %}
{%- if cookiecutter.postgres == "compose" %}
  postgres:
    env_file:
      - ../../.env
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
      start_interval: 2s
    image: postgres:18.4
    logging: *default-logging
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql
{%- endif %}
{%- if cookiecutter.redis == "compose" %}
  redis:
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - ${REDIS_MAXMEMORY}
      - --requirepass
      - ${REDIS_PASSWORD}
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
      start_interval: 2s
    image: redis:8.8.0
    logging: *default-logging
    restart: unless-stopped
    volumes:
      - redis_data:/data
{%- endif %}
{%- if cookiecutter.use_traefik == "yes" %}
  traefik:
    command:
{%- if cookiecutter.traefik_tls == "letsencrypt" %}
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
{%- endif %}
      - --entrypoints.ready.address=:8082
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --ping=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
{%- if cookiecutter.traefik_tls == "external" %}
      - --providers.file.filename=/etc/traefik/dynamic/traefik-dynamic.yaml
{%- endif %}
    healthcheck:
      test:
        - CMD
        - traefik
        - healthcheck
        - --ping
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
      start_interval: 2s
    image: traefik:v3.7.6
    logging: *default-logging
    ports:
      - "127.0.0.1:8082:8082"
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
{%- if cookiecutter.traefik_tls == "external" %}
      - ../certs:/etc/traefik/certs:ro
      - ../traefik-dynamic.yaml:/etc/traefik/dynamic/traefik-dynamic.yaml:ro
{%- else %}
      - traefik_data:/letsencrypt
{%- endif %}
{%- endif %}
{%- if cookiecutter.postgres == "compose" or cookiecutter.redis == "compose" or cookiecutter.use_traefik == "yes" and cookiecutter.traefik_tls == "letsencrypt" or cookiecutter.use_s3_media == "no" %}
volumes:
{%- if cookiecutter.use_s3_media == "no" %}
  media_data:
{%- endif %}
{%- if cookiecutter.postgres == "compose" %}
  postgres_data:
{%- endif %}
{%- if cookiecutter.redis == "compose" %}
  redis_data:
{%- endif %}
{%- if cookiecutter.use_traefik == "yes" and cookiecutter.traefik_tls == "letsencrypt" %}
  traefik_data:
{%- endif %}
{%- endif %}
