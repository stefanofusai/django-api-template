services:
  api:
    build:
      context: ../..
      dockerfile: .docker/Dockerfile
      args:
        UV_DEPENDENCY_GROUP: prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      DJANGO_ENV: prod
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - -o
        - /dev/null
        - http://127.0.0.1:8000/api/health
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 2s
    pre_start:
      - command:
          - /app/.docker/scripts/migrations.sh
    restart: unless-stopped
  postgres:
    env_file:
      - ../../.env
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
      start_interval: 2s
    image: postgres:18.4
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql
  redis:
    command:
      - redis-server
      - --appendonly
      - "yes"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
      start_interval: 2s
    image: redis:8.8.0
    restart: unless-stopped
    volumes:
      - redis_data:/data
  worker:
    build:
      context: ../..
      dockerfile: .docker/Dockerfile
      args:
        UV_DEPENDENCY_GROUP: prod
    command: /app/.docker/scripts/worker.sh
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      DJANGO_ENV: prod
    healthcheck:
      test:
        - CMD-SHELL
        - celery -A config inspect ping --destination=worker@$$HOSTNAME --timeout=5
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
      start_interval: 5s
    restart: unless-stopped
volumes:
  postgres_data:
  redis_data:
