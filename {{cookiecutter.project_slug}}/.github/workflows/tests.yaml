name: Tests
on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        # Keep this image in sync with .docker/compose/{dev,prod}.yaml;
        # Dependabot does not track images inside workflow service blocks;
        # scripts/check_postgres_image.py enforces agreement.
        image: postgres:18.4
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready --username=$POSTGRES_USER" --health-interval=5s --health-retries=5 --health-timeout=5s
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version-file: pyproject.toml
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Install dependencies
        run: uv sync --group=ci --locked --no-default-groups
      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: uv run --group=ci --locked --no-default-groups pytest
