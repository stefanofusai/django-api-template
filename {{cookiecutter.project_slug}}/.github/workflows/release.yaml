name: Release
on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
permissions:
  contents: read
jobs:
  dependency-audit:
    name: Dependency audit
    uses: ./.github/workflows/dependency-audit.yaml
  deployment-checks:
    name: Deployment checks
    uses: ./.github/workflows/deployment-checks.yaml
  docker-checks:
    name: Docker checks
    uses: ./.github/workflows/docker-checks.yaml
  migration-checks:
    name: Migration checks
    uses: ./.github/workflows/migration-checks.yaml
  pre-commit:
    name: Pre-commit
    uses: ./.github/workflows/pre-commit.yaml
  tests:
    name: Tests
    uses: ./.github/workflows/tests.yaml
  publish-release-image:
    name: Publish release image
    needs:
      - dependency-audit
      - deployment-checks
      - docker-checks
      - migration-checks
      - pre-commit
      - tests
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - name: Verify tag matches pyproject version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [ "$tag" != "$version" ]; then
            echo "tag v$tag does not match pyproject version $version" >&2
            exit 1
          fi
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0
      - name: Log in to GHCR
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute GHCR image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Build and push release image
        id: build
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: .docker/Dockerfile
          push: true
          build-args: UV_DEPENDENCY_GROUP=prod
          cache-from: type=gha,scope=prod
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.ref_name }}
      - name: Attest release image provenance
        uses: actions/attest@v4.1.1
        with:
          create-storage-record: false
          push-to-registry: true
          subject-digest: ${{ steps.build.outputs.digest }}
          subject-name: ${{ steps.image.outputs.name }}
