default_install_hook_types:
  - commit-msg
  - pre-commit
default_language_version:
  python: python3.14
exclude: ^\.agents/
repos:
  # Git
  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint
        args:
          - --contrib=contrib-title-conventional-commits
          - --ignore=B6
          - --msg-filename
  # Generic checks and fixes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
      - id: debug-statements
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: file-contents-sorter
        files: ^\.docker/Dockerfile\.dockerignore$
      - id: mixed-line-ending
      - id: name-tests-test
        exclude: ^tests/factories\.py$|^tests/integration/api/protected_docs_urls\.py$
      - id: trailing-whitespace
  # Python
  - repo: https://github.com/adamchainz/django-upgrade
    rev: 1.30.0
    hooks:
      - id: django-upgrade
        args:
          - --target-version=6.0
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-check
        args:
          - --fix
      - id: ruff-format
  - repo: https://github.com/astral-sh/ty-pre-commit
    rev: v0.0.47
    hooks:
      - id: ty
        args:
          - --locked
          - --no-python-downloads
  # Markdown
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args:
          - --disable=MD013
          - --
  # YAML
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args:
          - -d
          - |
            extends: default
            rules:
              comments:
                min-spaces-from-content: 1
              document-start:
                present: false
              line-length: disable
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
        args:
          - -formatter=eof_newline=true
  # GitHub Actions / JSON schema
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.2
    hooks:
      - id: check-dependabot
      - id: check-github-workflows
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
  # Dependency management
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.19
    hooks:
      - id: uv-audit
        args:
          - --locked
          - --preview-features=audit-command
      - id: uv-lock
  - repo: https://github.com/tsvikas/sync-with-uv
    rev: v0.5.0
    hooks:
      - id: sync-with-uv
